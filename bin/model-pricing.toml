# model-pricing.toml - USD cost per 1M tokens, keyed by the exact model
# id passed to ai_client (the --model flag / DEFAULT_MODEL). Used only
# to estimate cost from token counts already returned by the API - the
# API itself does not return cost.
#
# Models with no entry here just report token counts with no cost - no
# rate is guessed. Fill in rates for whichever models you actually use.
#
# [models."some-model-id"]
# input_per_1m = 3.00
# output_per_1m = 15.00
#
# Populated from https://opencode.ai/docs/zen pricing table. A few
# models there are priced per context-length tier (e.g. Sonnet 4.5,
# GPT 5.5/5.4, Gemini 3.1 Pro charge more past 200K/272K input tokens);
# this schema only supports one flat rate per model id, so the
# lower/short-context tier is used below - noted per entry.

